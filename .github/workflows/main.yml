name: Video Processor

on:
  workflow_dispatch:

jobs:
  prueba:

    runs-on: ubuntu-latest

    steps:

      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Verificar instalación
        run: ffmpeg -version
